  <style id="relcon-master">
  /* ═══════════════════════════════════════════════════
     RELCON CRM — Master Design System v3

  /* ── Design Tokens ─────────────────────────────── */
  :root {
    --brand:       #2563EB;
    --brand-dk:    #1D4ED8;
    --brand-lt:    #EFF6FF;
    --brand-glow:  rgba(37,99,235,0.12);

    --success-lt:  #ECFDF5;
    --warn:        #D97706;

    --danger:      #DC2626;

    --bg:          #F1F5F9;
    --surface:     #FFFFFF;
    --surface2:    #F8FAFC;
    --border:      #E2E8F0;
    --border-lt:   #F1F5F9;

    --txt:         #0F172A;
    --txt2:        #1E293B;
    --txt3:        #64748B;
    --txt4:        #94A3B8;
    --txt5:        #CBD5E1;

    --sh-md:   0 10px 20px rgba(15,23,42,0.08), 0 4px 8px rgba(15,23,42,0.04);

  /* ── Base ─────────────────────────────────────── */

  .crm-form-grid {

  input:focus, select:focus, textarea:focus {

  label, .label {

    </div>
    <div class="crm-topbar-spacer"></div>
  </div>
  <div class="crm-body">

    <div class="max-w-6xl mx-auto card">
      <div class="flex justify-between items-center mb-4">
        <div>
          <h1 class="text-lg font-semibold">⚡ Earthing Status Report</h1>
          <div class="muted">
            Shows latest HPCL visits per RO and earthing details (source: Daily
            Plans). "HPCL OFFICE" phases are excluded.
          </div>
        </div>
        <div class="flex items-center gap-2">
          <input
            id="searchInput"
            placeholder="🔎 Search RO / Name / Remark..."
            class="border px-2 py-1 rounded small"
            oninput="onSearchInput()"
          />
        </div>
      </div>

      <!-- Filters row -->
      <div class="flex items-center controls mb-3">
        <div>
          <label class="muted block text-xs">Engineer</label>
          <select
            id="engineerFilter"
            class="border px-2 py-1 rounded select small"
            onchange="onFilterChange()"
          >
            <option value="">All Engineers</option>
          </select>
        </div>

        <div>
          <label class="muted block text-xs">Earthing (Separate?)</label>
          <select
            id="earthingFilter"
            class="border px-2 py-1 rounded select small"
            onchange="onFilterChange()"
          >
            <option value="">All</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
          </select>
        </div>

        <div style="margin-left: auto; display: flex; gap: 8px">
          <button
            onclick="exportExcel()"
            class="bg-green-600 text-white px-3 py-1 rounded small"
            title="Export filtered results to Excel"
          >
            📤 Export
          </button>
          <button
            onclick="refresh()"
            class="bg-blue-600 text-white px-3 py-1 rounded small"
            title="Reload data"
          >
            ↻ Refresh
          </button>
        </div>
      </div>

      <div class="overflow-auto" style="max-height: 60vh">
        <table id="earthingTable" class="min-w-full small">
          <thead>
            <tr>
              <th>S.No</th>
              <th>Engineer</th>
              <th>RO Code</th>
              <th>RO Name</th>
              <th>Phase</th>
              <th>Last Visit Date</th>
              <th>Earthing (Separate?)</th>
              <th>Earthing Remark</th>
              <th>Prev Visit Earthing Remark</th>
              <th>Cable (m)</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <div id="pagination" class="small"></div>
    </div>

    <div id="loadingOverlay">
      <div class="flex flex-col items-center">
        <div
          class="w-12 h-12 border-4 border-green-600 border-t-transparent rounded-full animate-spin mb-2"
        ></div>
        <div class="text-sm text-gray-700">Loading data...</div>
      </div>
    </div>

    <script>
      const baseUrl = window.BACKEND_URL || "/api";
      let token = localStorage.getItem("token");
      let fullData = []; // daily plans raw
      let rows = []; // aggregated latest HPCL per RO (all)
      let filteredRows = []; // after filters/search
      let loggedInUser = null;

      // pagination
      let currentPage = 1;
      const rowsPerPage = 25;

      const tableBody = document.getElementById("tableBody");
      const loading = document.getElementById("loadingOverlay");
      const engineerFilterEl = document.getElementById("engineerFilter");
      const earthingFilterEl = document.getElementById("earthingFilter");
      const searchInputEl = document.getElementById("searchInput");
      const paginationEl = document.getElementById("pagination");

      function showLoading() {
        loading.style.display = "flex";
      }
      function hideLoading() {
        loading.style.display = "none";
      }

      async function fetchUserSession() {
        try {
          const res = await fetch(baseUrl + "/user", {
            headers: {
              Authorization: `Bearer ${localStorage.getItem("token")}`,
            },
          });
          if (!res.ok) {
            alert("Please login");
            window.location.href = "login.html";
            return null;
          }
          return await res.json();
        } catch (e) {
          console.error(e);
          alert("Auth error");
          window.location.href = "login.html";
        }
      }

      async function fetchDailyPlans() {
        try {
          const res = await fetch(baseUrl + "/getDailyPlans", {
            headers: {
              Authorization: `Bearer ${localStorage.getItem("token")}`,
            },
          });
          if (!res.ok) return [];
          return await res.json();
        } catch (e) {
          console.error("Failed to fetch daily plans:", e);
          return [];
        }
      }

      // Build latest plan per RO where phase indicates HPCL (phase contains "HPCL")
      // EXCLUDE entries where phase explicitly contains "HPCL OFFICE"
      // Also capture the previous visit's earthing remark (the latest visit before the latest one)
      function buildLatestHpclMap(plans) {
        const map = {};
        plans.forEach((p) => {
          try {
            const phase = (p.phase || "").toString();
            const uPhase = phase.toUpperCase();
            // include only HPCL phases but exclude "HPCL OFFICE"
            if (!uPhase.includes("HPCL")) return;
            if (uPhase.includes("HPCL OFFICE")) return; // skip HPCL OFFICE
            const rc = (p.roCode || "").toString().trim().toUpperCase();
            if (!rc) return;
            const d = p.date ? new Date(p.date) : null;
            const ts = d && !isNaN(d.getTime()) ? d.getTime() : 0;

            // get earthing remark from possible fields
            const earthingRemark =
              p.detailEarthingremark || p.detailEarthingRemark || "";

            if (!map[rc]) {
              map[rc] = {
                latest: {
                  roCode: rc,
                  roName: p.roName || "",
                  phase: phase,
                  lastVisitDate: p.date || "",
                  separateEarthing:
                    p.separateearthingStatus || p.separateearthingstatus || "",
                  earthingRemark: earthingRemark,
                  cableMeter:
                    p.cableRequirmentremark || p.cableRequirment || "",
                  engineer: p.engineer || "",
                  _ts: ts,
                },
                prev: null,
              };
            } else {
              const existingLatestTs =
                (map[rc].latest && map[rc].latest._ts) || 0;
              const existingPrevTs = (map[rc].prev && map[rc].prev._ts) || 0;
              // if this record is newer than current latest -> shift latest to prev
              if (ts > existingLatestTs) {
                // move latest to prev if valid
                if (map[rc].latest && map[rc].latest._ts) {
                  map[rc].prev = Object.assign({}, map[rc].latest);
                }
                // set new latest
                map[rc].latest = {
                  roCode: rc,
                  roName: p.roName || "",
                  phase: phase,
                  lastVisitDate: p.date || "",
                  separateEarthing:
                    p.separateearthingStatus || p.separateearthingstatus || "",
                  earthingRemark: earthingRemark,
                  cableMeter:
                    p.cableRequirmentremark || p.cableRequirment || "",
                  engineer: p.engineer || "",
                  _ts: ts,
                };
              } else if (ts > existingPrevTs) {
                // this is between latest and prev -> set as prev
                map[rc].prev = {
                  roCode: rc,
                  roName: p.roName || "",
                  phase: phase,
                  lastVisitDate: p.date || "",
                  separateEarthing:
                    p.separateearthingStatus || p.separateearthingstatus || "",
                  earthingRemark: earthingRemark,
                  cableMeter:
                    p.cableRequirmentremark || p.cableRequirment || "",
                  engineer: p.engineer || "",
                  _ts: ts,
                };
              }
            }
          } catch (e) {
            /* ignore per-row errors */
          }
        });
        // convert map to array of rows, include prevEarthingRemark as field (if any)
        return Object.values(map).map((entry) => {
          const latest = entry.latest || {};
          return {
            roCode: latest.roCode || "",
            roName: latest.roName || "",
            phase: latest.phase || "",
            lastVisitDate: latest.lastVisitDate || "",
            separateEarthing: latest.separateEarthing || "",
            earthingRemark: latest.earthingRemark || "",
            cableMeter: latest.cableMeter || "",
            engineer: latest.engineer || "",
            prevEarthingRemark: (entry.prev && entry.prev.earthingRemark) || "",
          };
        });
      }

      function populateEngineerFilter(listOfRows, user) {
        // unique engineers from rows
        const set = new Set();
        listOfRows.forEach((r) => {
          if (r.engineer) set.add(String(r.engineer).trim());
        });
        // clear existing and add
        engineerFilterEl.innerHTML = '<option value="">All Engineers</option>';
        Array.from(set)
          .sort((a, b) => a.localeCompare(b))
          .forEach((name) => {
            const opt = document.createElement("option");
            opt.value = name;
            opt.textContent = name;
            engineerFilterEl.appendChild(opt);
          });

        // If logged in user is engineer, set and disable filter
        if (user && user.role === "engineer") {
          const nameToSet = (user.engineerName || user.username || "").trim();
          engineerFilterEl.value = nameToSet;
          engineerFilterEl.disabled = true;
        } else {
          engineerFilterEl.disabled = false;
        }
      }

      // Render only current page slice and show S.No relative to full filtered set
      function renderCurrentPage() {
        tableBody.innerHTML = "";
        if (!filteredRows || filteredRows.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="10" class="muted" style="text-align:center;padding:12px">No data</td></tr>`;
          renderPagination(0);
          return;
        }
        const total = filteredRows.length;
        const totalPages = Math.max(1, Math.ceil(total / rowsPerPage));
        if (currentPage > totalPages) currentPage = totalPages;
        const start = (currentPage - 1) * rowsPerPage;
        const pageData = filteredRows.slice(start, start + rowsPerPage);

        tableBody.innerHTML = pageData
          .map((r, idx) => {
            const sno = start + idx + 1;
            return `
            <tr>
              <td>${sno}</td>
              <td>${escapeHtml(r.engineer)}</td>
              <td>${escapeHtml(r.roCode)}</td>
              <td>${escapeHtml(r.roName)}</td>
              <td>${escapeHtml(r.phase)}</td>
              <td>${escapeHtml(formatDate(r.lastVisitDate))}</td>
              <td>${escapeHtml(normalizeYesNo(r.separateEarthing))}</td>
              <td>${escapeHtml(r.earthingRemark)}</td>
              <td>${escapeHtml(r.prevEarthingRemark)}</td>
              <td>${escapeHtml(r.cableMeter)}</td>
            </tr>
          `;
          })
          .join("");

        renderPagination(total);
      }

      function renderPagination(totalRows) {
        paginationEl.innerHTML = "";
        const totalPages = Math.max(1, Math.ceil(totalRows / rowsPerPage));
        const prev = document.createElement("button");
        prev.textContent = "⬅ Prev";
        prev.disabled = currentPage === 1;
        prev.onclick = () => {
          if (currentPage > 1) {
            currentPage--;
            renderCurrentPage();
          }
        };
        paginationEl.appendChild(prev);

        // show a window of page buttons
        const maxButtons = 7;
        let startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
        let endPage = Math.min(totalPages, startPage + maxButtons - 1);
        if (endPage - startPage < maxButtons - 1) {
          startPage = Math.max(1, endPage - maxButtons + 1);
        }

        for (let i = startPage; i <= endPage; i++) {
          const btn = document.createElement("button");
          btn.textContent = i;
          if (i === currentPage) btn.classList.add("active");
          btn.onclick = ((p) => () => {
            currentPage = p;
            renderCurrentPage();
          })(i);
          paginationEl.appendChild(btn);
        }

        const next = document.createElement("button");
        next.textContent = "Next ➡";
        next.disabled = currentPage === totalPages;
        next.onclick = () => {
          if (currentPage < totalPages) {
            currentPage++;
            renderCurrentPage();
          }
        };
        paginationEl.appendChild(next);

        // summary
        const summary = document.createElement("div");
        summary.style.marginLeft = "12px";
        summary.style.color = "#374151";
        summary.style.fontSize = "12px";
        summary.textContent = `Showing ${Math.min(
          totalRows,
          (currentPage - 1) * rowsPerPage + 1
        )} - ${Math.min(totalRows, currentPage * rowsPerPage)} of ${totalRows}`;
        paginationEl.appendChild(summary);
      }

      function escapeHtml(s) {
        if (s === undefined || s === null) return "";
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }
      function formatDate(d) {
        if (!d) return "";
        const dt = new Date(d);
        if (isNaN(dt.getTime())) return d;
        return dt.toLocaleDateString("en-GB", {
          day: "2-digit",
          month: "short",
          year: "numeric",
        });
      }
      function normalizeYesNo(v) {
        if (!v) return "";
        const s = String(v).trim().toLowerCase();
        if (
          s === "yes" ||
          s === "separate" ||
          s === "seperate" ||
          s === "separate earthing"
        )
          return "Yes";
        if (s === "no" || s === "not separate" || s === "not") return "No";
        return v;
      }

      // called by filter inputs
      function onFilterChange() {
        currentPage = 1;
        applyFilters();
      }
      function onSearchInput() {
        // small debounce to avoid frequent rerenders
        clearTimeout(window._earthingSearchTimeout);
        window._earthingSearchTimeout = setTimeout(() => {
          currentPage = 1;
          applyFilters();
        }, 180);
      }

      function applyFilters() {
        const q = (searchInputEl.value || "").trim().toLowerCase();
        const selEngineer = (engineerFilterEl.value || "").trim();
        const selEarthing = (earthingFilterEl.value || "").trim(); // "", "Yes", "No"

        let out = rows.slice();

        // Role-based: engineer sees only their own records
        if (loggedInUser && loggedInUser.role === "engineer") {
          const myName = (
            loggedInUser.engineerName ||
            loggedInUser.username ||
            ""
          ).trim();
          out = out.filter((r) => (r.engineer || "").trim() === myName);
        } else {
          // admin or other roles can filter by engineer if selected
          if (selEngineer) {
            out = out.filter((r) => (r.engineer || "").trim() === selEngineer);
          }
        }

        // earthing filter
        if (selEarthing === "Yes") {
          out = out.filter((r) => normalizeYesNo(r.separateEarthing) === "Yes");
        } else if (selEarthing === "No") {
          out = out.filter((r) => normalizeYesNo(r.separateEarthing) === "No");
        }

        // search
        if (q) {
          out = out.filter((r) => {
            return [
              r.engineer,
              r.roCode,
              r.roName,
              r.phase,
              r.lastVisitDate,
              r.separateEarthing,
              r.earthingRemark,
              r.prevEarthingRemark,
              r.cableMeter,
            ].some((v) => v && String(v).toLowerCase().includes(q));
          });
        }

        filteredRows = out;
        renderCurrentPage();
      }

      async function loadData() {
        showLoading();
        const user = await fetchUserSession();
        if (!user) return;
        loggedInUser = user;
        fullData = await fetchDailyPlans();
        rows = buildLatestHpclMap(fullData);
        populateEngineerFilter(rows, loggedInUser);
        // default filters: if engineer, apply immediately; else show all
        currentPage = 1;
        applyFilters();
        hideLoading();
      }

      function refresh() {
        // clear search and filters for admin, but keep engineer filter for engineer role
        if (!loggedInUser || loggedInUser.role !== "engineer") {
          searchInputEl.value = "";
          engineerFilterEl.value = "";
          earthingFilterEl.value = "";
        } else {
          earthingFilterEl.value = "";
          searchInputEl.value = "";
        }
        loadData();
      }

      function exportExcel() {
        const dataToExport =
          filteredRows && filteredRows.length ? filteredRows : [];
        if (!dataToExport || dataToExport.length === 0)
          return alert("No data to export");
        const wb = XLSX.utils.book_new();
        const header = [
          [
            "S.No",
            "Engineer",
            "RO Code",
            "RO Name",
            "Phase",
            "Last Visit Date",
            "Earthing Separate (Yes/No)",
            "Earthing Remark",
            "Prev Visit Earthing Remark",
            "Cable (m)",
          ],
        ];
        const dataRows = dataToExport.map((r, i) => [
          i + 1,
          r.engineer,
          r.roCode,
          r.roName,
          r.phase,
          r.lastVisitDate,
          normalizeYesNo(r.separateEarthing),
          r.earthingRemark,
          r.prevEarthingRemark,
          r.cableMeter,
        ]);
        const ws = XLSX.utils.aoa_to_sheet([...header, ...dataRows]);
        XLSX.utils.book_append_sheet(wb, ws, "Earthing Status");
        const name = `Earthing_Status_${new Date()
          .toISOString()
          .slice(0, 10)}.xlsx`;
        XLSX.writeFile(wb, name);
      }

      // initial
      window.addEventListener("load", () => {
        loadData();
      });
    </script>
  
  </div>
</div>
</body>
</html>
