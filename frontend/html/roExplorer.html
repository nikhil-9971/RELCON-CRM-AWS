<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RO Explorer | RELCON CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script src="config.js"></script>
  <style>
    :root{
      --brand:#0176d3;--brand-dark:#014486;--brand-soft:#e8f4fd;
      --green:#2e844a;--green-soft:#eaf5ea;--red:#ba0517;--red-soft:#fef1ee;
      --orange:#dd5a0c;--orange-soft:#fff3e0;--teal:#0e7490;--teal-soft:#ecfeff;
      --bg:#f3f2f2;--surface:#fff;--surface2:#f9f9f9;--border:#dddbda;
      --txt:#080707;--txt2:#3e3e3c;--txt3:#706e6b;--txt4:#aeaeac;
      --r-sm:4px;--r:6px;--r-lg:8px;--sh-sm:0 2px 4px rgba(0,0,0,.09);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:13px;min-height:100vh}
    ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:#c8c6c4;border-radius:4px}
    .topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 20px;position:sticky;top:0;z-index:20;box-shadow:0 1px 3px rgba(15,23,42,.07)}
    .topbar i{width:30px;height:30px;border-radius:6px;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center}
    .topbar-title{font-size:14px;font-weight:800}.topbar-note{font-size:11px;color:var(--txt3);font-weight:600;margin-left:auto}
    .body{padding:16px 20px 28px}
    .header{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-sm);padding:14px 18px;margin-bottom:12px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
    .header-icon{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#0176d3,#0e7490);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .title{font-size:18px;font-weight:800;letter-spacing:-.2px}.meta{font-size:12px;color:var(--txt3);margin-top:2px}
    .search{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .input{height:34px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface);padding:0 11px;font-family:inherit;font-size:12px;outline:none;min-width:220px;text-transform:uppercase}
    .input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(1,118,211,.12)}
    .btn{height:34px;border:1px solid transparent;border-radius:var(--r-sm);padding:0 13px;font-family:inherit;font-size:12px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
    .btn-primary{background:var(--brand);color:#fff}.btn-primary:hover{background:var(--brand-dark)}
    .btn-neutral{background:var(--surface);color:var(--txt2);border-color:var(--border)}.btn-neutral:hover{background:var(--surface2)}
    .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px}
    .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-sm);padding:12px 14px;border-left:3px solid var(--brand)}
    .kpi.green{border-left-color:var(--green)}.kpi.orange{border-left-color:var(--orange)}.kpi.teal{border-left-color:var(--teal)}
    .kpi-num{font-size:22px;font-weight:800;line-height:1;color:#1a2e4a}.kpi-label{font-size:10px;color:var(--txt3);font-weight:800;text-transform:uppercase;letter-spacing:.4px;margin-top:4px}
    .layout{display:grid;grid-template-columns:260px 1fr;gap:12px;align-items:start}
    .side{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-sm);overflow:hidden;position:sticky;top:68px}
    .side-head{height:38px;padding:0 12px;display:flex;align-items:center;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--txt3);background:var(--surface2);border-bottom:1px solid var(--border)}
    .collection-btn{width:100%;border:0;background:#fff;padding:10px 12px;text-align:left;display:flex;align-items:center;gap:8px;border-bottom:1px solid #f0efee;cursor:pointer;font-family:inherit}
    .collection-btn:hover,.collection-btn.active{background:var(--brand-soft)}.collection-name{font-size:12px;font-weight:800;color:var(--txt2);flex:1}.collection-count{font-size:11px;font-weight:800;color:var(--brand)}
    .content{min-width:0}
    .empty{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-sm);padding:38px 18px;text-align:center;color:var(--txt3)}
    .section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-sm);margin-bottom:12px;overflow:hidden}
    .section-head{padding:11px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
    .section-title{font-size:13px;font-weight:800;flex:1}.pill{font-size:10px;font-weight:800;border-radius:999px;padding:2px 8px;background:var(--brand-soft);color:var(--brand)}
    .record{padding:12px 14px;border-bottom:1px solid #f0efee}.record:last-child{border-bottom:0}
    .record-title{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:8px}
    .record-title strong{font-size:13px;color:var(--txt);word-break:break-word}.record-id{font-size:10px;color:var(--txt4);font-weight:700}
    .fields{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:7px}
    .field{background:var(--surface2);border:1px solid #f0efee;border-radius:var(--r-sm);padding:7px 8px;min-width:0}
    .field-k{font-size:9px;color:var(--txt4);font-weight:800;text-transform:uppercase;letter-spacing:.4px}.field-v{font-size:11px;color:var(--txt2);font-weight:650;margin-top:2px;word-break:break-word;white-space:pre-wrap}
    details{margin-top:9px}summary{cursor:pointer;color:var(--brand);font-size:11px;font-weight:800}
    pre{margin-top:8px;background:#0f172a;color:#e5e7eb;border-radius:var(--r);padding:10px;font-size:11px;line-height:1.45;overflow:auto;max-height:340px}
    .toast{position:fixed;right:14px;bottom:14px;background:#0f172a;color:#fff;border-radius:8px;padding:10px 12px;font-size:12px;display:none;z-index:50}.toast.show{display:block}
    @media(max-width:850px){.body{padding:10px}.search{margin-left:0;width:100%}.input{min-width:0;flex:1}.layout{grid-template-columns:1fr}.side{position:static}.topbar-note{display:none}}
  </style>
</head>
<body>
  <div class="topbar">
    <i class="fa-solid fa-magnifying-glass-chart"></i>
    <div class="topbar-title">RO Explorer</div>
    <div class="topbar-note">Admin only</div>
  </div>

  <main class="body">
    <section class="header">
      <div class="header-icon"><i class="fa-solid fa-database"></i></div>
      <div>
        <div class="title">RO Code Database View</div>
        <div class="meta">Search one RO code and inspect every related CRM collection in one place.</div>
      </div>
      <div class="search">
        <input id="roInput" class="input" placeholder="Enter RO Code"/>
        <button class="btn btn-primary" onclick="searchRo()"><i class="fa-solid fa-search"></i> Search</button>
        <button class="btn btn-neutral" onclick="exportJson()" id="exportBtn" disabled><i class="fa-solid fa-download"></i> JSON</button>
      </div>
    </section>

    <section id="summary" class="summary" style="display:none"></section>

    <section class="layout" id="resultLayout" style="display:none">
      <aside class="side">
        <div class="side-head">Collections</div>
        <div id="collectionNav"></div>
      </aside>
      <div class="content" id="results"></div>
    </section>

    <div class="empty" id="emptyState">
      <i class="fa-solid fa-circle-info" style="font-size:22px;color:var(--brand);margin-bottom:8px"></i>
      <div style="font-weight:800;color:var(--txt2);margin-bottom:4px">Enter an RO code to start.</div>
      <div>Only admin users can use this database explorer.</div>
    </div>
  </main>
  <div class="toast" id="toast"></div>

  <script>
    const baseUrl = window.BACKEND_URL || "/api";
    const qs = new URLSearchParams(location.search || "");
    const token = qs.get("token") || localStorage.getItem("token") || "";
    let currentData = null;

    function esc(value){
      return String(value ?? "").replace(/[&<>"']/g, ch => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[ch]));
    }
    function toast(message){
      const el = document.getElementById("toast");
      el.textContent = message;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 3200);
    }
    function valueText(value){
      if(value === null || value === undefined || value === "") return "-";
      if(Array.isArray(value)) return value.length ? value.map(v => typeof v === "object" ? JSON.stringify(v) : String(v)).join(", ") : "-";
      if(typeof value === "object") return JSON.stringify(value);
      return String(value);
    }
    function pick(record, keys){
      const out = [];
      keys.forEach(key => {
        const value = key.split(".").reduce((obj, part) => obj && obj[part], record);
        if(value !== undefined && value !== null && String(value).trim() !== "") out.push({ key, value });
      });
      return out;
    }
    function displayFields(record, collectionKey){
      const common = ["roCode","roName","siteName","region","zone","phase","engineer","assignEngineer","date","incidentDate","status","isVerified","createdAt","updatedAt"];
      const byCollection = {
        roMaster:["siteStatus","connectivityType","bosIP","fccIP","siteActivestatus","lastAMCqtr"],
        dailyPlans:["purpose","issueType","incidentId","completionStatus","arrivalTime","leaveTime","whatDone"],
        hpclStatus:["planId.roCode","planId.roName","planId.engineer","workCompletion","spareUsed","activeSpare","faultySpare","spareRequirment","earthingStatus","duOffline","tankOffline","oms03"],
        jioBpStatus:["planId.roCode","planId.roName","planId.engineer","hpsdId","diagnosis","solution","activeMaterialUsed","faultyMaterialDetails","spareRequired","oms03"],
        bpclStatus:["planId.roCode","planId.roName","planId.engineer","class1DeviceCount","class2DeviceCount","relconAtgProvided","relconAtgCount","jioSimNumber","airtelSimNumber"],
        atgStatus:["planId.roCode","planId.roName","planId.engineer","atgIssuetype","bfrStatus","resolvedStatus","supportPerson","remark"],
        incidents:["incidentId","complaintRemark","closeRemark","incidentcloseDate"],
        tasks:["customer","issueType","issue","priority","replyStatus","assignedTo","mailDate","nextFollowUpDate","closureSummary"],
        materialRequirements:["customer","materialSummary","material","materialType","quantity","materialDispatchStatus","deliveryStatus","docketNumber","poNumber"],
        materialRequests:["requestMode","clientRequirement","materialSummary","quantity","materialDispatchStatus","deliveryStatus","materialRequestTo","createdByName","updatedByName"],
        notifications:["type","title","message","recipientUsername","isRead","visitDate"],
        auditTrails:["action","recordType","modifiedBy","engineerName","visitDate","timestamp","url","statusCode"],
      };
      const fields = pick(record, [...common, ...(byCollection[collectionKey] || [])]);
      return fields.slice(0, 18);
    }
    function titleFor(record, collectionKey, fallback){
      return record.roCode || record.planId?.roCode || record.incidentId || record.title || record.subject || record.materialSummary || record._id || fallback;
    }
    function renderSummary(data){
      const s = data.summary || {};
      document.getElementById("summary").style.display = "grid";
      document.getElementById("summary").innerHTML = `
        <div class="kpi"><div class="kpi-num">${esc(data.roCode)}</div><div class="kpi-label">RO Code</div></div>
        <div class="kpi green"><div class="kpi-num">${Number(s.totalRecords || 0)}</div><div class="kpi-label">Total Records</div></div>
        <div class="kpi teal"><div class="kpi-num">${Number(s.collectionsWithData || 0)}</div><div class="kpi-label">Collections With Data</div></div>
        <div class="kpi orange"><div class="kpi-num">${(s.planIds || []).length}</div><div class="kpi-label">Linked Daily Plans</div></div>
      `;
    }
    function renderResults(data){
      const collections = data.collections || [];
      document.getElementById("emptyState").style.display = "none";
      document.getElementById("resultLayout").style.display = "grid";
      document.getElementById("exportBtn").disabled = false;
      document.getElementById("collectionNav").innerHTML = collections.map((col, idx) => `
        <button class="collection-btn ${idx === 0 ? "active" : ""}" onclick="scrollToCollection('${esc(col.key)}', this)">
          <i class="fa-solid fa-table"></i><span class="collection-name">${esc(col.label)}</span><span class="collection-count">${Number(col.count || 0)}</span>
        </button>
      `).join("");
      document.getElementById("results").innerHTML = collections.map(col => `
        <section class="section" id="section-${esc(col.key)}">
          <div class="section-head">
            <i class="fa-solid fa-folder-open"></i>
            <div class="section-title">${esc(col.label)}</div>
            <span class="pill">${Number(col.count || 0)} record${Number(col.count || 0) === 1 ? "" : "s"}</span>
            ${col.truncated ? '<span class="pill" style="background:var(--orange-soft);color:var(--orange)">Partial results</span>' : ""}
          </div>
          ${(col.records || []).length ? col.records.map((record, index) => renderRecord(record, col, index)).join("") : '<div class="empty" style="box-shadow:none;border:0;border-radius:0">No records found in this collection.</div>'}
        </section>
      `).join("");
    }
    function renderRecord(record, col, index){
      const fields = displayFields(record, col.key);
      return `
        <article class="record">
          <div class="record-title">
            <strong>${esc(titleFor(record, col.key, `${col.label} #${index + 1}`))}</strong>
            <span class="record-id">${esc(record._id || "")}</span>
          </div>
          <div class="fields">
            ${fields.map(field => `
              <div class="field">
                <div class="field-k">${esc(field.key)}</div>
                <div class="field-v">${esc(valueText(field.value))}</div>
              </div>
            `).join("")}
          </div>
          <details>
            <summary>Raw database document</summary>
            <pre>${esc(JSON.stringify(record, null, 2))}</pre>
          </details>
        </article>
      `;
    }
    function scrollToCollection(key, btn){
      document.querySelectorAll(".collection-btn").forEach(item => item.classList.remove("active"));
      btn?.classList.add("active");
      document.getElementById(`section-${key}`)?.scrollIntoView({ behavior:"smooth", block:"start" });
    }
    async function searchRo(){
      const roCode = document.getElementById("roInput").value.trim().toUpperCase();
      if(!roCode) return toast("Please enter RO Code.");
      document.getElementById("emptyState").style.display = "block";
      document.getElementById("emptyState").innerHTML = '<div style="font-weight:800;color:var(--txt2)">Loading database records...</div>';
      document.getElementById("resultLayout").style.display = "none";
      document.getElementById("summary").style.display = "none";
      document.getElementById("exportBtn").disabled = true;
      try{
        const res = await fetch(`${baseUrl}/roExplorer/${encodeURIComponent(roCode)}`, { headers:{ Authorization:`Bearer ${token}` } });
        const data = await res.json().catch(() => ({}));
        if(!res.ok) throw new Error(data.error || "Unable to fetch RO data.");
        currentData = data;
        renderSummary(data);
        renderResults(data);
      }catch(err){
        currentData = null;
        document.getElementById("emptyState").innerHTML = `<div style="font-weight:800;color:var(--red);margin-bottom:4px">Unable to load RO data.</div><div>${esc(err.message || "Server error")}</div>`;
        toast(err.message || "Server error");
      }
    }
    function exportJson(){
      if(!currentData) return;
      const blob = new Blob([JSON.stringify(currentData, null, 2)], { type:"application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `ro-explorer-${currentData.roCode || "data"}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }
    document.getElementById("roInput").addEventListener("keydown", e => {
      if(e.key === "Enter") searchRo();
    });
    const initialRo = qs.get("roCode");
    if(initialRo){
      document.getElementById("roInput").value = initialRo.toUpperCase();
      searchRo();
    }
  </script>
</body>
</html>
