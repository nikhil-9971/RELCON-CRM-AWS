<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Daily Worksheet - RELCON CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script src="config.js"></script>
  <style>
    :root{
      --blue:#0176d3;--blue-lt:#e8f4fd;--green:#2e844a;--green-lt:#eaf5ea;--red:#ba0517;
      --bg:#f3f2f2;--surface:#fff;--surface2:#f9f9f9;--border:#dddbda;--border-lt:#f3f2f2;
      --txt:#080707;--txt2:#3e3e3c;--txt3:#706e6b;--txt4:#aeaeac;--r-sm:4px;--r:6px;--r-lg:8px;
      --sh-sm:0 2px 4px rgba(0,0,0,.09);--sh-md:0 8px 24px rgba(0,0,0,.12);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);font-size:13px;min-height:100vh}
    button,input,textarea{font-family:inherit}
    .strip{height:52px;background:var(--surface);border-bottom:1px solid var(--border);box-shadow:0 1px 3px rgba(15,23,42,.07);display:flex;align-items:center;gap:12px;padding:0 20px;position:sticky;top:0;z-index:40}
    .strip-icon{width:30px;height:30px;border-radius:6px;background:var(--blue-lt);color:var(--blue);display:flex;align-items:center;justify-content:center}
    .strip-title{font-weight:800;font-size:14px}.strip-meta{font-size:10px;color:var(--txt4);font-weight:800;text-transform:uppercase;letter-spacing:.6px}.spacer{flex:1}
    .body{padding:16px 20px;max-width:1180px;margin:0 auto}
    .page-head{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-sm);padding:16px 20px;margin-bottom:12px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
    .page-icon{width:46px;height:46px;border-radius:10px;background:linear-gradient(135deg,#0e7490,#0176d3);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 10px rgba(1,118,211,.32);flex-shrink:0}
    .page-title{font-size:19px;font-weight:800;letter-spacing:-.35px}.page-sub{font-size:12px;color:var(--txt3);margin-top:2px}.page-actions{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .btn{height:32px;padding:0 13px;border-radius:var(--r-sm);font-size:12px;font-weight:700;border:1px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:.15s}
    .btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:#0b5faa}.btn-neutral{background:#fff;border-color:var(--border);color:var(--txt2)}.btn-neutral:hover{background:var(--surface2)}.btn-success{background:var(--green);color:#fff}.btn-danger{background:var(--red);color:#fff}
    .form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-sm);padding:16px;margin-bottom:12px}
    .form-grid{display:grid;grid-template-columns:1fr 150px 150px auto;gap:12px;align-items:end}
    .field{display:flex;flex-direction:column;gap:4px}.label{font-size:10px;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:.55px}
    .input,.textarea{border:1px solid var(--border);border-radius:var(--r-sm);background:#fff;color:var(--txt);font-size:12px;outline:none}.input{height:34px;padding:5px 9px}.textarea{min-height:34px;max-height:110px;padding:8px 10px;resize:vertical;line-height:1.45}
    .input:focus,.textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(1,118,211,.12)}
    .table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-sm);overflow:hidden}.table-head{height:42px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 16px}.table-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.45px;display:flex;align-items:center;gap:7px}.count{background:var(--blue-lt);color:var(--blue);border:1px solid #c5dff5;border-radius:999px;padding:2px 8px;font-size:10px;font-weight:800}
    .table-wrap{overflow:auto;max-height:calc(100vh - 280px)}table{width:100%;min-width:760px;border-collapse:collapse}th{position:sticky;top:0;z-index:5;background:#1a2e4a;color:#e8f4fd;text-align:left;padding:9px 12px;border-right:1px solid #253d5b;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap}td{padding:10px 12px;border-bottom:1px solid var(--border-lt);vertical-align:top;font-size:12px;color:var(--txt2)}tr:hover td{background:#f8fbff}
    .desc{font-weight:600;color:var(--txt);white-space:pre-wrap;line-height:1.45}.time{font-weight:800;color:var(--blue)}.muted{font-size:10px;color:var(--txt3);margin-top:3px}.actions{display:flex;gap:4px;justify-content:center}.icon-btn{width:28px;height:28px;border:1px solid var(--border);background:#fff;border-radius:var(--r-sm);cursor:pointer;color:var(--txt3);display:inline-flex;align-items:center;justify-content:center}.icon-btn:hover{background:var(--blue-lt);color:var(--blue);border-color:#c5dff5}
    .empty{padding:34px;text-align:center;color:var(--txt3)}.empty i{font-size:24px;color:var(--txt4);margin-bottom:8px}
    .toast{position:fixed;right:18px;top:66px;background:#fff;border:1px solid var(--border);box-shadow:var(--sh-md);border-radius:var(--r-lg);padding:12px 14px;min-width:250px;display:none;align-items:flex-start;gap:10px;z-index:120;font-size:12px}.toast.show{display:flex;animation:toastIn .2s ease}.toast.success .toast-ico{color:var(--green)}.toast.error .toast-ico{color:var(--red)}.toast-title{font-weight:800;margin-bottom:2px}.toast-msg{color:var(--txt3)}@keyframes toastIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
    .loader{position:fixed;inset:0;background:rgba(243,242,242,.72);display:none;align-items:center;justify-content:center;z-index:90}.loader.show{display:flex}.spin{width:34px;height:34px;border:3px solid #d8dde6;border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:760px){.body{padding:12px}.page-actions{width:100%;margin-left:0}.btn{justify-content:center}.form-grid{grid-template-columns:1fr}.table-wrap{max-height:calc(100vh - 400px)}}
  </style>
</head>
<body>
  <header class="strip">
    <div class="strip-icon"><i class="fa-solid fa-clipboard-check"></i></div>
    <div><div class="strip-title">Admin Daily Worksheet</div><div class="strip-meta" id="dateBadge">Loading</div></div>
    <div class="spacer"></div>
    <button class="btn btn-neutral" onclick="loadEntries()"><i class="fa-solid fa-rotate-right"></i> Sync</button>
  </header>

  <main class="body">
    <section class="page-head">
      <div class="page-icon"><i class="fa-solid fa-briefcase"></i></div>
      <div>
        <div class="page-title">Daily Admin Work Log</div>
        <div class="page-sub">Sirf work description, start time aur end time update karein.</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" onclick="exportCSV()"><i class="fa-solid fa-file-export"></i> Export CSV</button>
      </div>
    </section>

    <section class="form-card">
      <input type="hidden" id="entryId"/>
      <div class="form-grid">
        <div class="field">
          <label class="label">Work Description</label>
          <textarea id="workDescription" class="textarea" placeholder="Aaj kya kaam kiya..."></textarea>
        </div>
        <div class="field">
          <label class="label">Start Time</label>
          <input id="startTime" type="time" class="input"/>
        </div>
        <div class="field">
          <label class="label">End Time</label>
          <input id="endTime" type="time" class="input"/>
        </div>
        <button class="btn btn-success" onclick="saveEntry()"><i class="fa-solid fa-floppy-disk"></i> Save</button>
      </div>
    </section>

    <section class="table-card">
      <div class="table-head">
        <div class="table-title"><i class="fa-solid fa-table-cells-large" style="color:var(--blue)"></i> Work Sheet</div>
        <span class="count" id="rowCount">0 records</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Work Description</th>
              <th>Start Time</th>
              <th>End Time</th>
              <th style="text-align:center">Actions</th>
            </tr>
          </thead>
          <tbody id="worksheetBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="loader" id="loader"><div class="spin"></div></div>
  <div class="toast" id="toast"><div class="toast-ico"><i class="fa-solid fa-circle-check"></i></div><div><div class="toast-title" id="toastTitle">Saved</div><div class="toast-msg" id="toastMsg"></div></div></div>

  <script>
    const baseUrl = window.BACKEND_URL || "/api";
    const token = localStorage.getItem("token") || new URLSearchParams(location.search).get("token") || "";
    const todayISO = new Date().toLocaleDateString("en-CA");
    let rows = [];

    document.getElementById("dateBadge").textContent = new Date().toLocaleDateString("en-IN",{weekday:"short",day:"2-digit",month:"short",year:"numeric"});

    function esc(v){return String(v ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
    function description(row){return row.workDescription || [row.workTitle,row.workDetails].filter(Boolean).join(" - ")}
    function showLoader(show){document.getElementById("loader").classList.toggle("show",!!show)}
    function showToast(message,type="success",title){const t=document.getElementById("toast");t.className="toast "+type;document.getElementById("toastTitle").textContent=title || (type==="error"?"Action Failed":"Success");document.getElementById("toastMsg").textContent=message;t.querySelector(".toast-ico").innerHTML=type==="error"?'<i class="fa-solid fa-circle-xmark"></i>':'<i class="fa-solid fa-circle-check"></i>';t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3000)}
    function clearForm(){document.getElementById("entryId").value="";document.getElementById("workDescription").value="";document.getElementById("startTime").value="";document.getElementById("endTime").value=""}

    async function loadEntries(){
      showLoader(true);
      try{
        const res = await fetch(`${baseUrl}/dailyWorksheet?date=${encodeURIComponent(todayISO)}`, { headers:{Authorization:`Bearer ${token}`}, credentials:"include" });
        if(!res.ok) throw new Error("Failed");
        rows = await res.json();
        rows = Array.isArray(rows) ? rows : [];
        renderTable();
      }catch(err){
        console.error(err);
        showToast("Worksheet load nahi ho paya. Admin login/session check karein.", "error");
        renderEmpty("No worksheet entries available.");
      }finally{showLoader(false)}
    }

    function renderEmpty(msg){
      document.getElementById("worksheetBody").innerHTML=`<tr><td colspan="4"><div class="empty"><i class="fa-solid fa-clipboard-list"></i><div>${esc(msg)}</div></div></td></tr>`;
      document.getElementById("rowCount").textContent="0 records";
    }

    function renderTable(){
      document.getElementById("rowCount").textContent=`${rows.length} records`;
      if(!rows.length) return renderEmpty("Aaj ke liye koi worksheet entry nahi hai.");
      document.getElementById("worksheetBody").innerHTML = rows
        .sort((a,b)=>String(a.startTime||"").localeCompare(String(b.startTime||"")))
        .map(row=>`
          <tr>
            <td><div class="desc">${esc(description(row))}</div></td>
            <td><span class="time">${esc(row.startTime || "-")}</span></td>
            <td><span class="time">${esc(row.endTime || "-")}</span></td>
            <td>
              <div class="actions">
                <button class="icon-btn" title="Edit" onclick="editEntry('${row._id}')"><i class="fa-solid fa-pen"></i></button>
                <button class="icon-btn" title="Delete" onclick="deleteEntry('${row._id}')"><i class="fa-solid fa-trash"></i></button>
              </div>
            </td>
          </tr>`).join("");
    }

    function editEntry(id){
      const row = rows.find(item=>item._id===id);
      if(!row) return;
      document.getElementById("entryId").value = row._id;
      document.getElementById("workDescription").value = description(row);
      document.getElementById("startTime").value = row.startTime || "";
      document.getElementById("endTime").value = row.endTime || "";
      document.getElementById("workDescription").focus();
    }

    async function saveEntry(){
      const id = document.getElementById("entryId").value;
      const payload = {
        date: todayISO,
        workDescription: document.getElementById("workDescription").value.trim(),
        startTime: document.getElementById("startTime").value,
        endTime: document.getElementById("endTime").value,
      };
      if(!payload.workDescription) return showToast("Work description required hai.", "error");
      showLoader(true);
      try{
        const res = await fetch(`${baseUrl}/dailyWorksheet${id ? `/${id}` : ""}`, {
          method: id ? "PUT" : "POST",
          headers: {"Content-Type":"application/json", Authorization:`Bearer ${token}`},
          credentials:"include",
          body: JSON.stringify(payload),
        });
        if(!res.ok) throw new Error("Save failed");
        clearForm();
        showToast("Worksheet saved.");
        await loadEntries();
      }catch(err){
        console.error(err);
        showToast("Worksheet save nahi ho paya.", "error");
      }finally{showLoader(false)}
    }

    async function deleteEntry(id){
      if(!confirm("Is worksheet entry ko delete karna hai?")) return;
      showLoader(true);
      try{
        const res = await fetch(`${baseUrl}/dailyWorksheet/${id}`, { method:"DELETE", headers:{Authorization:`Bearer ${token}`}, credentials:"include" });
        if(!res.ok) throw new Error("Delete failed");
        clearForm();
        showToast("Worksheet entry deleted.");
        await loadEntries();
      }catch(err){
        console.error(err);
        showToast("Delete nahi ho paya.", "error");
      }finally{showLoader(false)}
    }

    function exportCSV(){
      const csvRows = [["Work Description","Start Time","End Time"]];
      rows.forEach(row=>csvRows.push([description(row), row.startTime || "", row.endTime || ""]));
      const csv = csvRows.map(row=>row.map(cell=>`"${String(cell).replace(/"/g,'""')}"`).join(",")).join("\n");
      const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `admin-daily-worksheet-${todayISO}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(a.href);
    }

    loadEntries();
  </script>
  <script src="errorLogger.js"></script>
</body>
</html>
