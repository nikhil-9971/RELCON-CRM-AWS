# ── WebSocket upgrade map (server block ke bahar hona chahiye) ──────────────
map $http_upgrade $connection_upgrade {
    default   upgrade;
    ''        close;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # ── API + WebSocket proxy ────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:3000/;        # trailing slash — /api/ prefix strip hoga
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;

        # WebSocket handshake headers
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         $connection_upgrade;  # FIX: "upgrade" hardcode ki jagah map variable use karo

        # WebSocket timeout — long-lived connections ke liye
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static assets caching ────────────────────────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|svg|ico|mp4|webm|woff|woff2|js|css)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;

    error_page 404 /index.html;
}
