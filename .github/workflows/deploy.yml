name: CI/CD - Build, Push & Deploy

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Backend - Test + Build + Push
  # ─────────────────────────────────────────
  build-backend:
    name: Backend → Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run lint (if present)
        run: cd backend && npm run lint --if-present

      - name: Run tests (if present)
        run: |
          cd backend
          TEST_SCRIPT=$(node -e "const p=require('./package.json'); console.log(p.scripts&&p.scripts.test||'')")
          if echo "$TEST_SCRIPT" | grep -q "no test"; then
            echo "⏭️  No tests defined — skipping"
          else
            npm test
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/relcon-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/relcon-backend:${{ github.sha }}

  # ─────────────────────────────────────────
  # JOB 2: Frontend - Build + Push
  # ─────────────────────────────────────────
  build-frontend:
    name: Frontend → Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/relcon-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/relcon-frontend:${{ github.sha }}

  # ─────────────────────────────────────────
  # JOB 3: Deploy to EC2 via SSH
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]   # Dono build hone ke baad

    steps:
      - name: Checkout (docker-compose.yml ke liye)
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.EC2_USER }}/relcon-crm"

      - name: SSH into EC2 & Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}/relcon-crm

           

            cat > .env << EOF
             DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
             MONGO_URI=${{ secrets.MONO_URI }}
             SESSION_SECRET=${{ secrets.SESSION_SECRET }}
             GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
             FRONTEND_URL=https://nikhildevops.co.in
             EC2_HOST=nikhildevops.co.in
            EOF

            # Latest images pull karo (dono)
            docker pull ${{ secrets.DOCKER_USERNAME }}/relcon-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/relcon-frontend:latest

            # Containers restart
            docker compose down
            docker compose up -d

            # Purane images clean karo
            docker image prune -f

            echo "✅ RELCON CRM deployed successfully!"
